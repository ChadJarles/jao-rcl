<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');
:root{
  --bg:#f4f3ef;--sur:#ffffff;--sur2:#f0ede8;--sur3:#e8e4de;
  --bdr:#ddd9d2;--bdr2:#c8c4bc;
  --txt:#181714;--txt2:#6a6760;--txt3:#9c9890;
  --acc:#1c3d5e;--acc2:#15304a;--acc-l:#e8edf3;--acc-t:#1c3d5e;
  --grn:#1a5c38;--grn-l:#e6f2ec;--grn-t:#1a5c38;
  --red:#8b1c1c;--red-l:#fce8e8;--red-t:#8b1c1c;
  --amb:#7a4800;--amb-l:#fdf0e0;--amb-t:#7a4800;
  --r:5px;--rl:9px;--f:'IBM Plex Sans',sans-serif;--m:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--f);background:var(--bg);color:var(--txt);font-size:14px;line-height:1.55;display:flex;flex-direction:column}

/* header */
.hdr{background:var(--acc);color:#fff;padding:0 1.25rem;height:50px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:10}
.hdr-brand{display:flex;align-items:center;gap:12px}
.logo{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.95)}
.hdr-sep{width:1px;height:18px;background:rgba(255,255,255,.2)}
.hdr-title{font-size:13px;color:rgba(255,255,255,.6)}
.hdr-actions{display:flex;gap:6px;align-items:center}
.mob-back{display:none;align-items:center}
.sync-status{font-size:11px;color:rgba(255,255,255,.7);white-space:nowrap;padding:3px 8px;border-radius:var(--r)}
.sync-status.synced{color:#7effc0}
.sync-status.syncing{color:rgba(255,255,255,.6)}
.sync-status.error{color:#ffaaaa}
.login-overlay{position:fixed;inset:0;background:var(--acc);display:flex;align-items:center;justify-content:center;z-index:1000}
.login-box{background:var(--sur);border-radius:var(--rl);padding:2.5rem 3rem;text-align:center;max-width:380px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.25)}
.login-logo{font-size:13px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--acc);margin-bottom:8px}
.login-title{font-size:18px;font-weight:600;color:var(--txt);margin-bottom:6px}
.login-sub{font-size:13px;color:var(--txt3);margin-bottom:24px;line-height:1.5}
.login-btn{width:100%;padding:11px;font-size:14px;font-weight:500;border-radius:var(--r);border:none;background:var(--acc);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;font-family:var(--f)}
.login-btn:hover{background:var(--acc2)}
.login-err{font-size:12px;color:var(--red);margin-top:12px}

/* buttons */
.btn{font-family:var(--f);font-size:12px;padding:5px 12px;border-radius:var(--r);border:1px solid var(--bdr2);background:var(--sur);color:var(--txt);cursor:pointer;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;transition:background .1s}
.btn:hover{background:var(--sur2)}
.btn.primary{background:var(--acc);color:#fff;border-color:var(--acc)}
.btn.primary:hover{background:var(--acc2)}
.btn.ghost{border-color:rgba(255,255,255,.25);color:rgba(255,255,255,.8);background:transparent}
.btn.ghost:hover{background:rgba(255,255,255,.1)}
.btn.danger{color:var(--red);border-color:#f0c0c0}
.btn.danger:hover{background:var(--red-l)}
.btn.success{background:var(--grn);color:#fff;border-color:var(--grn)}
.btn.success:hover{background:#145230}
.btn.sm{font-size:11px;padding:4px 9px}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* layout */
.workspace{display:flex;flex:1;overflow:hidden}

/* sidebar */
.sidebar{width:320px;min-width:280px;border-right:1px solid var(--bdr);display:flex;flex-direction:column;background:var(--sur);flex-shrink:0;transition:width .25s}
.sidebar.collapsed{width:52px;min-width:52px;overflow:hidden}
.sidebar.collapsed .sb-search,
.sidebar.collapsed .sb-filters,
.sidebar.collapsed .sb-stats,
.sidebar.collapsed #eic-filter-bar,
.sidebar.collapsed .sb-list{display:none}
.sidebar.collapsed #sb-page{display:none!important}
.sb-top{padding:10px 12px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-shrink:0}
.sb-search{flex:1;font-family:var(--f);font-size:12px;padding:5px 9px;border:1px solid var(--bdr2);border-radius:var(--r);background:var(--bg);color:var(--txt);min-width:0}
.sb-search:focus{outline:none;border-color:var(--acc)}
.sb-filters{padding:6px 12px;border-bottom:1px solid var(--bdr);display:flex;gap:6px;flex-shrink:0}
.sb-filters select{font-family:var(--f);font-size:11px;padding:4px 7px;border:1px solid var(--bdr2);border-radius:var(--r);background:var(--bg);color:var(--txt);flex:1}
.sb-list{flex:1;overflow-y:auto}
.sb-stats{padding:8px 12px;border-bottom:1px solid var(--bdr);display:flex;gap:6px;flex-shrink:0}
.sb-stat{font-size:11px;color:var(--txt3);padding:3px 8px;border-radius:var(--r);cursor:pointer;border:1px solid transparent;transition:all .1s}
.sb-stat:hover{background:var(--sur2);color:var(--txt)}
.sb-stat.active{background:var(--acc-l);color:var(--acc-t);border-color:var(--acc);font-weight:500}
.case-row{padding:10px 12px;border-bottom:1px solid var(--bdr);cursor:pointer;transition:background .1s}
.case-row:hover{background:var(--sur2)}
.case-row.active{background:var(--acc-l);border-left:2px solid var(--acc)}
.cr-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:3px}
.cr-id{font-family:var(--m);font-size:10px;color:var(--txt3);flex-shrink:0;margin-top:1px}
.cr-name{font-size:13px;font-weight:500;line-height:1.3}
.cr-sub{font-size:11px;color:var(--txt3);margin-bottom:4px}
.cr-badge{display:inline-block;font-size:9px;font-weight:600;padding:2px 6px;border-radius:3px;text-transform:uppercase;letter-spacing:.04em}
.b-reg{background:var(--acc-l);color:var(--acc-t)}
.b-esig{background:var(--grn-l);color:var(--grn-t)}
.b-other{background:var(--sur2);color:var(--txt2)}
.b-mod{background:var(--amb-l);color:var(--amb-t)}
.cr-pbar{height:2px;background:var(--sur3);border-radius:2px;margin-top:5px}
.cr-pfill{height:100%;border-radius:2px;background:var(--acc)}
.cr-pfill.done{background:var(--grn)}
.cr-stage{font-size:10px;color:var(--txt3);margin-top:3px}
.sb-empty{padding:2rem 1rem;text-align:center;font-size:12px;color:var(--txt3);font-style:italic}
.sb-page{padding:7px 12px;border-top:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;gap:6px;flex-shrink:0;background:var(--sur)}
.sb-page-info{font-size:11px;color:var(--txt3)}
.sb-page-btns{display:flex;gap:4px}
.sb-page-btn{font-family:var(--f);font-size:11px;padding:3px 8px;border:1px solid var(--bdr2);border-radius:var(--r);background:var(--sur);color:var(--txt);cursor:pointer}
.sb-page-btn:hover{background:var(--sur2)}
.sb-page-btn:disabled{opacity:.35;cursor:not-allowed}
.collapse-btn{width:28px;height:28px;border-radius:var(--r);border:1px solid var(--bdr2);background:var(--sur);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--txt3);flex-shrink:0}
.collapse-btn:hover{background:var(--sur2)}

/* main panel */
.main-panel{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--txt3);gap:10px}
.welcome-icon{font-size:32px;opacity:.4}
.welcome h2{font-size:15px;font-weight:500;color:var(--txt2)}
.welcome p{font-size:13px}

@media(max-width:768px){
  .workspace{flex-direction:column}
  .sidebar{width:100%!important;min-width:0!important;border-right:none;border-bottom:1px solid var(--bdr);flex-shrink:0;max-height:55vh}
  .sidebar.collapsed{width:100%!important;min-width:0!important;max-height:55vh}
  .sidebar.panel-hidden{display:none!important}
  .main-panel{flex:1;min-height:0}
  .main-panel.panel-hidden{display:none!important}
  .mob-back{display:flex!important}
}

/* case view */
.case-view{flex:1;display:flex;flex-direction:column;min-height:0}
.case-hdr{padding:1rem 1.5rem;border-bottom:1px solid var(--bdr);background:var(--sur);flex-shrink:0}
.case-hdr-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px}
.case-title-row{display:flex;align-items:center;gap:10px}
.case-id-badge{font-family:var(--m);font-size:11px;color:var(--txt3);background:var(--sur2);padding:2px 8px;border-radius:3px;border:1px solid var(--bdr)}
.case-name{font-size:18px;font-weight:600}
.case-meta{display:flex;gap:16px;flex-wrap:wrap}
.meta-item{font-size:12px;color:var(--txt2)}
.meta-label{color:var(--txt3);margin-right:4px}
.edit-fields-btn{font-size:11px;padding:3px 9px;border:1px solid var(--bdr2);border-radius:var(--r);background:transparent;cursor:pointer;color:var(--txt2)}
.edit-fields-btn:hover{background:var(--sur2)}

/* edit header panel */
.edit-hdr-panel{background:var(--sur2);border-bottom:1px solid var(--bdr);padding:12px 1.5rem}
.ehp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:10px}
.fg{display:flex;flex-direction:column;gap:3px}
.fg label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--txt3)}
.fg input,.fg select,.fg textarea{font-family:var(--f);font-size:12px;padding:6px 9px;border:1px solid var(--bdr2);border-radius:var(--r);background:var(--sur);color:var(--txt);width:100%}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--acc)}

/* stage nav */
.stage-nav{padding:0 1.5rem;border-bottom:1px solid var(--bdr);background:var(--sur);display:flex;align-items:center;gap:0;overflow-x:auto;flex-shrink:0}
.stab{font-size:12px;padding:10px 14px;cursor:pointer;border-bottom:2px solid transparent;color:var(--txt2);white-space:nowrap;transition:color .1s}
.stab:hover{color:var(--txt)}
.stab.on{color:var(--acc);border-bottom-color:var(--acc);font-weight:500}
.stab.done{color:var(--grn)}
.eic-link{cursor:pointer;color:var(--acc);text-decoration:underline dotted;text-underline-offset:2px}
.eic-link:hover{text-decoration:underline}
.eic-filter-bar{padding:6px 12px;background:var(--acc-l);border-bottom:1px solid var(--acc);display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:11px;color:var(--acc-t);flex-shrink:0}
.eic-filter-bar button{background:none;border:none;cursor:pointer;color:var(--acc);font-size:13px;line-height:1;padding:0 2px;font-weight:600}
.stage-progress{margin-left:auto;padding-left:16px;font-size:11px;color:var(--txt3);white-space:nowrap;font-family:var(--m)}

/* checklist body */
.checklist-body{flex:1;overflow-y:auto;padding:1.25rem 1.5rem}
.section{margin-bottom:1.25rem}
.sh{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--txt2);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:center}
.sh-count{font-weight:400;color:var(--txt3);font-family:var(--m)}
.ci{display:flex;align-items:flex-start;gap:9px;padding:6px 0;border-bottom:0.5px solid var(--bdr)}
.ci:last-child{border-bottom:none}
.ci input[type=checkbox]{margin-top:3px;flex-shrink:0;accent-color:var(--acc);width:14px;height:14px}
.ci label{font-size:13px;cursor:pointer;line-height:1.5;color:var(--txt)}
.ci.checked label{color:var(--txt3);text-decoration:line-through}
.ci.na{opacity:.38}
.ci.na label::after{content:' (N/A)';font-size:10px;color:var(--txt3)}
.ci.na input{pointer-events:none}
.ci.req label::before{content:'* ';color:var(--red);font-size:10px}
.opt-note{font-size:11px;color:var(--txt3);font-style:italic;margin-left:auto;padding-left:8px;white-space:nowrap}
.tso-grid{display:flex;flex-direction:column;gap:0}
.tso-row{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;padding:6px 0;border-bottom:0.5px solid var(--bdr)}
.tso-row:last-child{border-bottom:none}
.tso-label{font-size:13px;color:var(--txt)}
.tso-sel{font-family:var(--f);font-size:12px;padding:5px 9px;border:1px solid var(--bdr2);border-radius:var(--r);background:var(--sur);color:var(--txt);min-width:200px}
.tso-sel:focus{outline:none;border-color:var(--acc)}
.rules-grid{display:flex;flex-direction:column;gap:0}
.date-row{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.date-row label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--txt3)}
.date-row input{font-family:var(--f);font-size:13px;padding:7px 10px;border:1px solid var(--bdr2);border-radius:var(--r);background:var(--sur);color:var(--txt);max-width:240px}
.date-row input:focus{outline:none;border-color:var(--acc)}
.info-box{font-size:12px;color:var(--txt2);background:var(--acc-l);border-radius:var(--r);padding:9px 12px;margin-bottom:12px;border-left:3px solid var(--acc)}

/* stage footer */
.stage-footer{padding:12px 1.5rem;border-top:1px solid var(--bdr);background:var(--sur);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0}
.blocked-msg{font-size:12px;color:var(--red);display:flex;align-items:center;gap:6px}
.progress-summary{font-size:12px;color:var(--txt3)}

/* comments */
.comments-section{padding:0 1.5rem 1.5rem}
.cbox{border:1px solid var(--bdr);border-radius:var(--rl);overflow:hidden}
.cbox-h{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--txt2);padding:7px 12px;background:var(--sur2);border-bottom:1px solid var(--bdr)}
.clist{max-height:130px;overflow-y:auto}
.ce{padding:7px 12px;border-bottom:0.5px solid var(--bdr);font-size:12px;display:flex;gap:10px}
.ce:last-child{border-bottom:none}
.cts{font-family:var(--m);font-size:10px;color:var(--txt3);flex-shrink:0;padding-top:1px}
.nc{font-size:12px;color:var(--txt3);padding:9px 12px;font-style:italic}
.ci-row{display:flex;gap:6px;padding:7px;border-top:1px solid var(--bdr);background:var(--sur2)}
.ci-row input{flex:1;font-family:var(--f);font-size:12px;padding:5px 9px;border:1px solid var(--bdr2);border-radius:var(--r);background:var(--sur);color:var(--txt)}
.ci-row input:focus{outline:none;border-color:var(--acc)}

/* second op */
.sop-section{padding:0 1.5rem 1.5rem}
.sop{background:var(--sur2);border:1px solid var(--bdr);border-radius:var(--rl);padding:12px}
.sop-h{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--txt2);margin-bottom:10px}
.sop-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(8,8,6,.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:1.5rem}
.modal{background:var(--sur);border:1px solid var(--bdr2);border-radius:var(--rl);width:100%;max-width:580px;padding:1.5rem;max-height:90vh;overflow-y:auto}
.modal h2{font-size:15px;font-weight:600;margin-bottom:1.25rem}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:1.25rem}

/* toast */
.toast{position:fixed;bottom:1.25rem;right:1.25rem;background:var(--acc);color:#fff;padding:9px 16px;border-radius:var(--r);font-size:12px;z-index:999;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}

/* completion */
.complete-view{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--grn);padding:3rem}
.complete-icon{font-size:40px}
.complete-title{font-size:16px;font-weight:600}
.complete-sub{font-size:13px;color:var(--txt2)}

@media(max-width:700px){.sidebar{width:100%;border-right:none;border-bottom:1px solid var(--bdr)}.workspace{flex-direction:column}}
</style>

<body>

<div class="hdr">
  <div class="hdr-brand">
    <span class="logo">JAO</span>
    <div class="hdr-sep"></div>
    <span class="hdr-title" id="hdr-title">Registration Checklist (RCL)</span>
  </div>
  <div class="hdr-actions">
    <button class="btn ghost sm mob-back" onclick="showSidebar()" style="display:none">&#8592; Cases</button>
    <button class="btn ghost sm" onclick="openAdmin()" title="Admin settings">&#9881;</button>
    <button class="btn ghost sm" onclick="exportData()">&#8595; Export</button>
    <button class="btn ghost sm" onclick="document.getElementById('imp').click()">&#8593; Import</button>
    <input type="file" id="imp" accept=".json" style="display:none" onchange="importData(event)"/>
    <button class="btn primary sm" onclick="openNew()">+ New case</button>
  </div>
</div>

<div class="workspace">
  <div class="sidebar" id="sidebar">
    <div class="sb-top">
      <input class="sb-search" id="srch" placeholder="Search name or EIC..." oninput="currentPage=1;renderList()"/>
      <button class="collapse-btn" onclick="toggleSidebar()" id="col-btn" title="Collapse sidebar">&#8249;</button>
    </div>
    <div class="sb-filters">
      <select id="ftype" onchange="onTypeFilterChange()">
        <option value="">All types</option>
        <option>MP Registration</option>
        <option>MP Registration (eSIG)</option>
        <option>Amendment to PA</option>
        <option>Bank Guarantee Amendments</option>
        <option>Bank Guarantees</option>
        <option>Modification Requests</option>
        <option>MP Termination</option>
      </select>
      <select id="fstage" onchange="renderList()">
        <option value="">All stages</option>
      </select>
    </div>
    <div class="sb-stats" id="sb-stats"></div>
    <div id="eic-filter-bar" style="display:none" class="eic-filter-bar">
      <span>&#128269; Filtered by EIC: <strong id="eic-filter-label"></strong></span>
      <button onclick="clearEicFilter()" title="Clear filter">&#10005;</button>
    </div>
    <div class="sb-list" id="sb-list"></div>
    <div class="sb-page sidebar.collapsed" id="sb-page" style="display:none">
      <span class="sb-page-info" id="sb-page-info"></span>
      <div class="sb-page-btns">
        <button class="sb-page-btn" id="sb-prev" onclick="changePage(-1)">&#8592;</button>
        <button class="sb-page-btn" id="sb-next" onclick="changePage(1)">&#8594;</button>
      </div>
    </div>
  </div>

  <div class="main-panel" id="main-panel">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">&#9744;</div>
      <h2>No case selected</h2>
      <p>Select a case from the list or create a new one</p>
      <button class="btn primary" onclick="openNew()" style="margin-top:8px">+ New case</button>
    </div>
    <div class="case-view" id="case-view" style="display:none"></div>
  </div>
</div>

<div id="modal-wrap" style="display:none"></div>
<div class="toast" id="toast"></div>
</div>
</div>

function showLoginOverlay(err=''){
  const ol=document.getElementById('login-overlay');
  if(ol) ol.style.display='flex';
  const errEl=document.getElementById('login-err');
  if(errEl) errEl.textContent=err;
}
function hideLoginOverlay(){
  const ol=document.getElementById('login-overlay');
  if(ol) ol.style.display='none';
}

function initMsal(){
  try{
    msalInstance=new msal.PublicClientApplication({
      auth:{clientId:OD_CLIENT_ID,authority:`https://login.microsoftonline.com/${OD_TENANT_ID}`,redirectUri:window.location.href.split('?')[0].split('#')[0]},
      cache:{cacheLocation:'localStorage',storeAuthStateInCookie:false},
    });
    msalInstance.handleRedirectPromise().then(resp=>{
      if(resp) odAccount=resp.account;
      else{const accounts=msalInstance.getAllAccounts();if(accounts.length>0)odAccount=accounts[0];}
      if(odAccount){
        currentUser={name:odAccount.name||odAccount.username,email:odAccount.username};
        odEnabled=true;hideLoginOverlay();setSyncStatus('syncing','Connecting…');odLoad();
      } else {
        showLoginOverlay();
      }
    }).catch(e=>{showLoginOverlay('Authentication error. Please try again.');console.error(e);});
  }catch(e){showLoginOverlay('Failed to initialise auth library.');console.warn('MSAL init failed',e);}
}

function updateOdBtn(){
  const btn=document.getElementById('od-btn');if(!btn) return;
  if(odAccount){btn.textContent='☁ '+odAccount.name.split(' ')[0];btn.title='Signed in as '+odAccount.username+' — click to sign out';}
  else{btn.textContent='☁ Sign in';btn.title='Sign in with Microsoft 365 to sync via OneDrive';}
}

function setSyncStatus(type,msg){
  const el=document.getElementById('sync-status');if(!el) return;
  el.textContent=msg;el.className='sync-status'+(type?' '+type:'');
}

async function odGetToken(){
  if(!msalInstance||!odAccount) return null;
  try{const r=await msalInstance.acquireTokenSilent({scopes:OD_SCOPES,account:odAccount});return r.accessToken;}
  catch(e){
    try{const r=await msalInstance.acquireTokenPopup({scopes:OD_SCOPES});odAccount=r.account;return r.accessToken;}
    catch(e2){setSyncStatus('error','Token error');return null;}
  }
}

async function odLoad(){
  setSyncStatus('syncing','Loading…');
  const token=await odGetToken();if(!token){setSyncStatus('error','Not signed in');return;}
  try{
    const res=await fetch(`https://graph.microsoft.com/v1.0/sites/${CFG.odSharePointSite}/drive/root:/${OD_FOLDER}/${OD_FILE}:/content`,{headers:{Authorization:'Bearer '+token}});
    if(res.status===404){setSyncStatus('syncing','Creating file…');await odSaveNow();}
    else if(res.ok){
      const data=await res.json();
      if(Array.isArray(data)&&data.length>0){
        cases=data;localStorage.setItem(STORAGE_KEY,JSON.stringify(cases));
        renderList();if(activeId) renderCase(activeId);
      }
      setSyncStatus('synced','✓ OneDrive');
    }else{throw new Error('HTTP '+res.status);}
  }catch(e){setSyncStatus('error','Load failed');console.error(e);}
  updateOdBtn();
}

async function odSaveNow(){
  if(!odEnabled) return;
  const token=await odGetToken();if(!token) return;
  try{
    setSyncStatus('syncing','Saving…');
    const res=await fetch(`https://graph.microsoft.com/v1.0/sites/${CFG.odSharePointSite}/drive/root:/${OD_FOLDER}/${OD_FILE}:/content`,{
      method:'PUT',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify(cases,null,2)
    });
    if(res.ok){setSyncStatus('synced','✓ OneDrive');}else{throw new Error('HTTP '+res.status);}
  }catch(e){setSyncStatus('error','Save failed');console.error(e);}
}

function odSaveDebounced(){
  if(!odEnabled) return;
  clearTimeout(odSaveTimer);odSaveTimer=setTimeout(odSaveNow,1500);
  setSyncStatus('syncing','Saving…');
}

async function odSignIn(){
  if(!msalInstance){showLoginOverlay('Auth library not loaded.');return;}
  if(odAccount){
    if(confirm('Signed in as '+odAccount.username+'. Sign out?')){
      await msalInstance.logoutPopup({account:odAccount});
      odAccount=null;odEnabled=false;currentUser={name:'',email:''};
      setSyncStatus('','');updateOdBtn();showLoginOverlay();
    }
    return;
  }
  try{
    const errEl=document.getElementById('login-err');
    if(errEl) errEl.textContent='Signing in…';
    const r=await msalInstance.loginPopup({scopes:OD_SCOPES});
    odAccount=r.account;odEnabled=true;
    currentUser={name:odAccount.name||odAccount.username,email:odAccount.username};
    hideLoginOverlay();updateOdBtn();
    setSyncStatus('syncing','Loading…');await odLoad();
  }catch(e){showLoginOverlay('Sign-in failed. Please try again.');console.error(e);}
}

const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');

function stagesFor(c){
  if(c.caseType==='MP Registration') return STAGES_WET;
  if(c.caseType==='MP Registration (eSIG)') return STAGES_ESIG;
  if(c.caseType==='Amendment to PA') return c.track==='esig'?STAGES_PA_AMEND_ESIG:STAGES_PA_AMEND_WET;
  if(c.caseType==='Bank Guarantees'||c.caseType==='Bank Guarantee Amendments') return STAGES_BG;
  if(c.caseType==='Modification Requests') return STAGES_MR;
  if(c.caseType==='MP Termination') return STAGES_TERM;
  return STAGES_OTHER;
}

function ruleOn(d,r){
  if(!r) return true;
  if(r==='cr_hu') return true;
  const rs=d.rules||[];const tso=d.tso||{};
  if(r==='shadow') return rs.includes('Relevant Shadow Allocation Rules');
  if(r==='cz_s') return rs.includes('Relevant Shadow Allocation Rules for CZ-DE, CZ-PL, PL-SK, PL-DE, CZ-SK and SK-HU');
  if(r==='swiss_d') return rs.includes('Daily Capacity Allocation on Swiss Borders');
  if(r==='swiss_lt') return rs.some(x=>x.includes('Swiss')||x.includes('UK')||x.includes('GB'));
  if(r==='intraday') return rs.some(x=>x.toLowerCase().includes('intraday')&&!x.includes('IFA')&&!x.includes('ElecLink')&&!x.includes('Viking')&&!x.includes('Switzerland'));
  if(r==='ifa') return rs.some(x=>x.includes('IFA'));
  if(r==='el') return rs.some(x=>x.includes('ElecLink'));
  if(r==='vk') return rs.some(x=>x.includes('Viking'));
  if(r==='ua') return rs.includes('Rules for Daily Capacity Allocation on Ukrainian Borders');
  if(r==='xjao') return rs.includes('Rules for explicit Daily Allocation on Bidding Zone border serviced by JAO');
  if(r==='itme') return rs.includes('Rules for Explicit Daily Capacity Allocation on Bidding Zone border Italy-Montenegro');
  if(r==='tso') return Object.values(tso).some(v=>v&&!v.startsWith('Not relevant'));
  return true;
}

function progress(c){
  if(c.stage==='Complete') return 100;
  const chk=c.checks||{},dt=c.dates||{};
  let tot=0,done=0;
  const cnt=arr=>{arr.forEach(k=>{tot++;if(chk[k])done++;});};
  if(c.caseType==='MP Registration'){
    cnt(MANDATORY_INIT);
    cnt(MANDATORY_S1);
    ['origReq','origRec','partySubm'].forEach(k=>{tot++;if(dt[k])done++;});
    tot++;if(chk['Originals match scanned versions'])done++;
    cnt([...ESIG_LEGAL_CHECKS,...ESIG_KYC_CHECKS]);
    cnt(SIG_CHECKS);
    ['origSubmitted','origSigned'].forEach(k=>{tot++;if(dt[k])done++;});
    cnt([...MASTER_DATA,...ECAT_ITEMS.map(x=>x.t),...DS_CHECKS,...FU_CHECKS]);
  } else if(c.caseType==='MP Registration (eSIG)'){
    cnt(MANDATORY_INIT);
    cnt([...MANDATORY_S1,...PA_ESIG_EXTRA,...ESIG_DOCSCHECK_CHECKS]);
    cnt([...ESIG_LEGAL_CHECKS,...ESIG_KYC_CHECKS]);
    cnt([...ESIG_SIG_CHECKS,...ESIG_COUNTERSIG_CHECKS]);
    ['esigSubmitted','esigSigned'].forEach(k=>{tot++;if(dt[k])done++;});
    cnt([...MASTER_DATA,...ECAT_ITEMS.map(x=>x.t),...DS_CHECKS,...FU_CHECKS]);
  } else if(c.caseType==='Amendment to PA'){
    const isEsig=c.track==='esig';
    cnt(isEsig?MANDATORY_PA_AMEND_DOCS_ESIG:MANDATORY_PA_AMEND_DOCS_WET);
    if(!isEsig){['paOrigReq','paOrigRec'].forEach(k=>{tot++;if(dt[k])done++;});tot++;if(chk['PA Amendment originals match scanned versions'])done++;}
    cnt(PA_AMEND_SIG_CHECKS);
    ['paSubmitted','paSigned'].forEach(k=>{tot++;if(dt[k])done++;});
    cnt(PA_AMEND_ECAT_CHECKS);
    cnt(isEsig?PA_AMEND_FOLLOWUP_ESIG:PA_AMEND_FOLLOWUP_WET);
  } else if(c.caseType==='Bank Guarantees'){
    cnt(MANDATORY_BG_DOC);
    cnt(MANDATORY_BG_ECAT);
    cnt(MANDATORY_BG_SECOND);
    cnt(BG_FOLLOWUP_MANDATORY);
  } else if(c.caseType==='Bank Guarantee Amendments'){
    cnt(MANDATORY_BGA_DOC);
    cnt(MANDATORY_BGA_ECAT);
    cnt(MANDATORY_BGA_SECOND);
    cnt(BGA_FOLLOWUP_MANDATORY);
  } else if(c.caseType==='Modification Requests'){
    const mrc=MR_CHECKS[c.modType]||{docs:[],fu:[]};
    cnt(mrc.docs);cnt(mrc.fu);
  } else if(c.caseType==='MP Termination'){
    cnt(TERM_REQUEST_CHECKS);
    cnt(TERM_FTR_MANDATORY);
    cnt(TERM_ECAT_MANDATORY);
    cnt(TERM_FOLLOWUP_CHECKS);
  }
  return tot?Math.round(done/tot*100):0;
}

function canAdvance(c){
  if(c.caseType!=='MP Registration'&&c.caseType!=='MP Registration (eSIG)'&&c.caseType!=='Amendment to PA'&&c.caseType!=='Bank Guarantees'&&c.caseType!=='Bank Guarantee Amendments'&&c.caseType!=='Modification Requests'&&c.caseType!=='MP Termination') return true;
  const chk=c.checks||{},dt=c.dates||{};
  const stages=stagesFor(c);
  const stageIdx=stages.indexOf(c.stage);
  const completed=c.completedStages||[];
  const prevStagesAllDone=stages.slice(0,stageIdx).filter(s=>s!=='Complete').every(s=>completed.includes(s));
  if(!prevStagesAllDone) return false;
  if(c.stage==='Initial Check') return MANDATORY_INIT.every(k=>chk[k]);
  if(c.stage==='Scanned Document Check') return MANDATORY_S1.every(k=>chk[k]);
  if(c.stage==='Linked Tickets') return MANDATORY_ESIG_S2.every(k=>chk[k]);
  if(c.stage==='Original Documents Phase'){
    if(c.caseType==='Amendment to PA') return ['paOrigReq','paOrigRec'].every(k=>dt[k])&&chk['PA Amendment originals match scanned versions'];
    return ['origReq','origRec','partySubm'].every(k=>dt[k])&&chk['Originals match scanned versions'];
  }
  if(c.stage==='Document Check') return [...MANDATORY_S1,...PA_ESIG_EXTRA,...ESIG_DOCSCHECK_CHECKS].every(k=>chk[k]);
  if(c.stage==='Documents Check'){
    if(c.caseType==='Amendment to PA'){
      const mandatory=c.track==='esig'?MANDATORY_PA_AMEND_DOCS_ESIG:MANDATORY_PA_AMEND_DOCS_WET;
      return mandatory.every(k=>chk[k]);
    }
    return true;
  }
  if(c.stage==='Signatures'&&c.caseType==='Amendment to PA') return PA_AMEND_SIG_CHECKS.every(k=>chk[k])&&['paSubmitted','paSigned'].every(k=>dt[k]);
  if(c.stage==='Follow-up'&&c.caseType==='Amendment to PA'){const fu=c.track==='esig'?PA_AMEND_FOLLOWUP_ESIG:PA_AMEND_FOLLOWUP_WET;return fu.every(k=>chk[k]);}
  if(c.stage==='Signature & Party Creation'){
    if(c.caseType==='MP Registration (eSIG)') return MANDATORY_ESIG_S3.every(k=>chk[k])&&['esigSubmitted','esigSigned'].every(k=>dt[k]);
    return MANDATORY_S3.every(k=>chk[k])&&['origSubmitted','origSigned'].every(k=>dt[k]);
  }
  if(c.stage==='eCAT Set-up'){
    if(c.caseType==='Amendment to PA') return PA_AMEND_ECAT_CHECKS.every(k=>chk[k]);
    if(c.caseType==='Bank Guarantees') return MANDATORY_BG_ECAT.every(k=>chk[k]);
    if(c.caseType==='Bank Guarantee Amendments') return MANDATORY_BGA_ECAT.every(k=>chk[k]);
    const mandEcat=ECAT_ITEMS.filter(x=>ruleOn(c,x.r)&&x.r===null).map(x=>x.t);
    return [...MASTER_DATA,...mandEcat,...DS_CHECKS,...FU_CHECKS].every(k=>chk[k]);
  }
  if(c.stage==='Document Check'&&c.caseType==='Bank Guarantees') return MANDATORY_BG_DOC.every(k=>chk[k]);
  if(c.stage==='Document Check'&&c.caseType==='Bank Guarantee Amendments') return MANDATORY_BGA_DOC.every(k=>chk[k]);
  if(c.stage==='Second Check'&&c.caseType==='Bank Guarantees') return MANDATORY_BG_SECOND.every(k=>(c.checks||{})[`sc_${k}`]);
  if(c.stage==='Second Check'&&c.caseType==='Bank Guarantee Amendments') return MANDATORY_BGA_SECOND.every(k=>(c.checks||{})[`sc_${k}`]);
  if(c.stage==='Follow-up'&&c.caseType==='Bank Guarantees') return BG_FOLLOWUP_MANDATORY.every(k=>chk[k]);
  if(c.stage==='Follow-up'&&c.caseType==='Bank Guarantee Amendments') return BGA_FOLLOWUP_MANDATORY.every(k=>chk[k]);
  if(c.caseType==='Modification Requests'){
    const mrc=MR_CHECKS[c.modType]||{docs:[],fu:[]};
    if(c.stage==='Documents Check') return mrc.docs.every(k=>chk[k]);
    if(c.stage==='Follow-up') return mrc.fu.length===0||mrc.fu.every(k=>chk[k]);
  }
  if(c.caseType==='MP Termination'){
    if(c.stage==='Request and Status') return TERM_REQUEST_CHECKS.every(k=>chk[k]);
    if(c.stage==='Funds Transfer Request') return TERM_FTR_MANDATORY.every(k=>chk[k]);
    if(c.stage==='Actions in eCAT') return TERM_ECAT_MANDATORY.every(k=>chk[k]);
    if(c.stage==='Contacted and Follow-up') return TERM_FOLLOWUP_CHECKS.every(k=>chk[k]);
  }
  return true;
}

function missingCount(c){
  if(c.caseType!=='MP Registration'&&c.caseType!=='MP Registration (eSIG)'&&c.caseType!=='Amendment to PA'&&c.caseType!=='Bank Guarantees'&&c.caseType!=='Bank Guarantee Amendments'&&c.caseType!=='Modification Requests'&&c.caseType!=='MP Termination') return 0;
  const chk=c.checks||{},dt=c.dates||{};
  const stages=stagesFor(c);
  const stageIdx=stages.indexOf(c.stage);
  const completed=c.completedStages||[];
  const prevIncomplete=stages.slice(0,stageIdx).filter(s=>s!=='Complete'&&!completed.includes(s));
  if(prevIncomplete.length>0) return -prevIncomplete.length;
  if(c.stage==='Initial Check') return MANDATORY_INIT.filter(k=>!chk[k]).length;
  if(c.stage==='Scanned Document Check') return MANDATORY_S1.filter(k=>!chk[k]).length;
  if(c.stage==='Linked Tickets') return MANDATORY_ESIG_S2.filter(k=>!chk[k]).length;
  if(c.stage==='Original Documents Phase'){
    if(c.caseType==='Amendment to PA'){
      let m=['paOrigReq','paOrigRec'].filter(k=>!dt[k]).length;
      if(!chk['PA Amendment originals match scanned versions']) m++;
      return m;
    }
    let m=['origReq','origRec','partySubm'].filter(k=>!dt[k]).length;
    if(!chk['Originals match scanned versions']) m++;
    return m;
  }
  if(c.stage==='Document Check') return [...MANDATORY_S1,...PA_ESIG_EXTRA,...ESIG_DOCSCHECK_CHECKS].filter(k=>!chk[k]).length;
  if(c.stage==='Documents Check'&&c.caseType==='Amendment to PA'){
    const mandatory=c.track==='esig'?MANDATORY_PA_AMEND_DOCS_ESIG:MANDATORY_PA_AMEND_DOCS_WET;
    return mandatory.filter(k=>!chk[k]).length;
  }
  if(c.stage==='Signatures'&&c.caseType==='Amendment to PA'){
    let m=PA_AMEND_SIG_CHECKS.filter(k=>!chk[k]).length;
    m+=['paSubmitted','paSigned'].filter(k=>!dt[k]).length;
    return m;
  }
  if(c.stage==='Follow-up'&&c.caseType==='Amendment to PA'){
    const fu=c.track==='esig'?PA_AMEND_FOLLOWUP_ESIG:PA_AMEND_FOLLOWUP_WET;
    return fu.filter(k=>!chk[k]).length;
  }
  if(c.stage==='Signature & Party Creation'){
    if(c.caseType==='MP Registration (eSIG)'){
      let m=MANDATORY_ESIG_S3.filter(k=>!chk[k]).length;
      m+=['esigSubmitted','esigSigned'].filter(k=>!dt[k]).length;
      return m;
    }
    let m=MANDATORY_S3.filter(k=>!chk[k]).length;
    m+=['origSubmitted','origSigned'].filter(k=>!dt[k]).length;
    return m;
  }
  if(c.stage==='eCAT Set-up'){
    if(c.caseType==='Amendment to PA') return PA_AMEND_ECAT_CHECKS.filter(k=>!chk[k]).length;
    if(c.caseType==='Bank Guarantees') return MANDATORY_BG_ECAT.filter(k=>!chk[k]).length;
    if(c.caseType==='Bank Guarantee Amendments') return MANDATORY_BGA_ECAT.filter(k=>!chk[k]).length;
    const mandEcat=ECAT_ITEMS.filter(x=>ruleOn(c,x.r)&&x.r===null).map(x=>x.t);
    return [...MASTER_DATA,...mandEcat,...DS_CHECKS,...FU_CHECKS].filter(k=>!chk[k]).length;
  }
  if(c.stage==='Document Check'&&c.caseType==='Bank Guarantees') return MANDATORY_BG_DOC.filter(k=>!chk[k]).length;
  if(c.stage==='Document Check'&&c.caseType==='Bank Guarantee Amendments') return MANDATORY_BGA_DOC.filter(k=>!chk[k]).length;
  if(c.stage==='Second Check'&&c.caseType==='Bank Guarantees') return MANDATORY_BG_SECOND.filter(k=>!(c.checks||{})[`sc_${k}`]).length;
  if(c.stage==='Second Check'&&c.caseType==='Bank Guarantee Amendments') return MANDATORY_BGA_SECOND.filter(k=>!(c.checks||{})[`sc_${k}`]).length;
  if(c.stage==='Follow-up'&&c.caseType==='Bank Guarantees') return BG_FOLLOWUP_MANDATORY.filter(k=>!chk[k]).length;
  if(c.stage==='Follow-up'&&c.caseType==='Bank Guarantee Amendments') return BGA_FOLLOWUP_MANDATORY.filter(k=>!chk[k]).length;
  if(c.caseType==='Modification Requests'){
    const mrc=MR_CHECKS[c.modType]||{docs:[],fu:[]};
    if(c.stage==='Documents Check') return mrc.docs.filter(k=>!chk[k]).length;
    if(c.stage==='Follow-up') return mrc.fu.filter(k=>!chk[k]).length;
  }
  if(c.caseType==='MP Termination'){
    if(c.stage==='Request and Status') return TERM_REQUEST_CHECKS.filter(k=>!chk[k]).length;
    if(c.stage==='Funds Transfer Request') return TERM_FTR_MANDATORY.filter(k=>!chk[k]).length;
    if(c.stage==='Actions in eCAT') return TERM_ECAT_MANDATORY.filter(k=>!chk[k]).length;
    if(c.stage==='Contacted and Follow-up') return TERM_FOLLOWUP_CHECKS.filter(k=>!chk[k]).length;
  }
  return 0;
}

function advanceStage(id){
  const c=cases.find(x=>x.id===id);if(!c) return;
  if(!canAdvance(c)){toast('Please complete all mandatory items first');return;}
  const stages=stagesFor(c);
  const idx=stages.indexOf(c.stage);
  if(idx<stages.length-1){
    c.completedStages=c.completedStages||[];
    if(!c.completedStages.includes(c.stage)) c.completedStages.push(c.stage);
    c.stage=stages[idx+1];
    if(c.stage==='Complete') c.completedAt=new Date().toISOString().slice(0,10);
    viewingStage=null;
    saveCases();
    const sbList=document.getElementById('sb-list');
    const scrollPos=sbList?sbList.scrollTop:0;
    renderList();
    if(sbList) sbList.scrollTop=scrollPos;
    renderCase(id);
    const newBody=document.querySelector('.checklist-body');
    if(newBody) newBody.scrollTop=0;
    toast('Moved to: '+c.stage);
  }
}

function prevStage(id){
  const c=cases.find(x=>x.id===id);if(!c) return;
  const stages=stagesFor(c);
  const idx=stages.indexOf(c.stage);
  if(idx>0){
    c.stage=stages[idx-1];
    viewingStage=null;
    saveCases();
    const sbList=document.getElementById('sb-list');
    const scrollPos=sbList?sbList.scrollTop:0;
    renderList();
    if(sbList) sbList.scrollTop=scrollPos;
    renderCase(id);
    const newBody=document.querySelector('.checklist-body');
    if(newBody) newBody.scrollTop=0;
  }
}

    // If no case is open, make sure sidebar is visible
    if(!activeId){
      sb.classList.remove('panel-hidden');
      document.getElementById('main-panel')?.classList.remove('panel-hidden');
    }
  } else {
    if(btn) btn.style.display='';
    sb.classList.remove('panel-hidden');
    document.getElementById('main-panel')?.classList.remove('panel-hidden');
  }
}

function toggleSidebar(){
  if(isMobile()) return;
  sidebarCollapsed=!sidebarCollapsed;

  const btn=document.getElementById('col-btn');

function onTypeFilterChange(){
  const ft=document.getElementById('ftype').value;
  const fstage=document.getElementById('fstage');
  const prevVal=fstage.value;
  let stages=[];
  if(ft==='MP Registration') stages=STAGES_WET;
  else if(ft==='MP Registration (eSIG)') stages=STAGES_ESIG;
  else if(ft==='Amendment to PA') stages=[...new Set([...STAGES_PA_AMEND_WET,...STAGES_PA_AMEND_ESIG])];
  else if(ft==='Bank Guarantees'||ft==='Bank Guarantee Amendments') stages=STAGES_BG;
  else if(ft==='Modification Requests') stages=STAGES_MR;
  else if(ft==='MP Termination') stages=STAGES_TERM;
  else if(ft){
    const unique=[...new Set(cases.filter(c=>c.caseType===ft).map(c=>c.stage))];
    stages=unique.length?unique:STAGES_OTHER;
  } else {
    const allStages=[...new Set(cases.map(c=>c.stage))];
    stages=allStages;
  }
  fstage.innerHTML=`<option value="">All stages</option>`+stages.map(s=>`<option ${s===prevVal?'selected':''}>${esc(s)}</option>`).join('');
  renderList();
}

function setEicFilter(eic){
  if(!eic) return;
  eicFilter=eic; currentPage=1;
  renderList();
}
function clearEicFilter(){
  eicFilter=''; currentPage=1;
  renderList();
}

function setStatusFilter(f){
  statusFilter=statusFilter===f?'':f;
  currentPage=1;
  renderList();
}

function changePage(dir){
  currentPage+=dir;
  renderList();
  document.getElementById('sb-list').scrollTop=0;
}

function renderList(){
  const q=document.getElementById('srch').value.toLowerCase();
  const ft=document.getElementById('ftype').value;
  const fs=document.getElementById('fstage').value;
  const total=cases.length;
  const activeCount=cases.filter(x=>x.stage!=='Complete').length;
  const doneCount=cases.filter(x=>x.stage==='Complete').length;
  document.getElementById('sb-stats').innerHTML=`
    <span class="sb-stat${statusFilter===''?' active':''}" onclick="setStatusFilter('')"><strong>${total}</strong> total</span>
    <span class="sb-stat${statusFilter==='active'?' active':''}" onclick="setStatusFilter('active')"><strong>${activeCount}</strong> active</span>
    <span class="sb-stat${statusFilter==='done'?' active':''}" onclick="setStatusFilter('done')"><strong>${doneCount}</strong> done</span>
  `;
  const bar=document.getElementById('eic-filter-bar');
  const lbl=document.getElementById('eic-filter-label');
  if(eicFilter){bar.style.display='';if(lbl)lbl.textContent=eicFilter;}
  else{bar.style.display='none';}
  const fc=cases.filter(c=>{
    if(eicFilter&&(c.eic||'').toLowerCase()!==eicFilter.toLowerCase()) return false;
    if(statusFilter==='active'&&c.stage==='Complete') return false;
    if(statusFilter==='done'&&c.stage!=='Complete') return false;
    if(q&&!c.mpName.toLowerCase().includes(q)&&!(c.eic||'').toLowerCase().includes(q)) return false;
    if(ft&&c.caseType!==ft) return false;
    if(fs&&c.stage!==fs) return false;
    return true;
  });
  if(!fc.length){
    document.getElementById('sb-list').innerHTML='<div class="sb-empty">No cases found</div>';
    document.getElementById('sb-page').style.display='none';
    return;
  }
  const totalPages=Math.ceil(fc.length/PAGE_SIZE);
  currentPage=Math.max(1,Math.min(currentPage,totalPages));
  const pageStart=(currentPage-1)*PAGE_SIZE;
  const pageCases=fc.slice(pageStart,pageStart+PAGE_SIZE);

  document.getElementById('sb-list').innerHTML=pageCases.map(c=>{
    const p=progress(c);
    return`<div class="case-row${c.id===activeId?' active':''}" onclick="selectCase('${c.id}')">
      <div class="cr-top"><span class="cr-name">${esc(c.mpName)}</span><span class="cr-id">${c.id}</span></div>
      <div class="cr-sub"><span class="eic-link" onclick="event.stopPropagation();setEicFilter('${esc(c.eic||'')}')" title="Filter by this EIC">${esc(c.eic||'EIC pending')}</span> &middot; ${c.caseType==='Amendment to PA'&&c.amendNumber?`Amend. ${esc(c.amendNumber)} v${c.amendVersion||1}`:esc(c.country||'—')}</div>
      <span class="cr-badge ${badgeClass(c.caseType)}">${esc(c.caseType==='Modification Requests'&&c.modType?c.modType:c.caseType)}</span>
      <div class="cr-pbar"><div class="cr-pfill${p===100?' done':''}" style="width:${p}%"></div></div>
      <div class="cr-stage">${esc(c.stage)}</div>
    </div>`;
  }).join('');

  // Pagination bar
  const pageEl=document.getElementById('sb-page');
  if(totalPages>1){
    pageEl.style.display='';
    document.getElementById('sb-page-info').textContent=`${pageStart+1}–${Math.min(pageStart+PAGE_SIZE,fc.length)} of ${fc.length}`;
    document.getElementById('sb-prev').disabled=currentPage===1;
    document.getElementById('sb-next').disabled=currentPage===totalPages;
  } else {
    pageEl.style.display='none';
  }
}

function selectCase(id){
  const sbList=document.getElementById('sb-list');
  const scrollPos=sbList?sbList.scrollTop:0;
  activeId=id;
  viewingStage=null;
  editHeaderOpen=false;
  document.getElementById('welcome').style.display='none';
  document.getElementById('case-view').style.display='flex';
  renderList();
  if(sbList) sbList.scrollTop=scrollPos;
  renderCase(id);
  showMainPanel();
}

function renderCase(id){
  const c=cases.find(x=>x.id===id);if(!c) return;
  const stages=stagesFor(c);
  const displayStage=viewingStage&&stages.includes(viewingStage)?viewingStage:c.stage;
  const stageIdx=stages.indexOf(c.stage);
  const displayIdx=stages.indexOf(displayStage);
  const stageNum=stageIdx+1;
  const stageTotal=stages.length;
  const p=progress(c);
  const missing=missingCount(c);
  const isComplete=c.stage==='Complete';
  const isLast=stageIdx===stages.length-2;

  const allStagesDone=stages.filter(s=>s!=='Complete').every(s=>(c.completedStages||[]).includes(s));
  const stageTabs=stages.map((s,i)=>{
    const isDone=(c.completedStages||[]).includes(s);
    const isOn=s===displayStage;
    const isCompleteTab=s==='Complete';
    const isLocked=isCompleteTab&&!isComplete&&!allStagesDone;
    return`<div class="stab${isOn?' on':''}${isDone?' done':''}${isLocked?' locked':''}" ${isLocked?'title="Complete all stages first"':''}onclick="jumpStage('${id}','${s}')">${s}${isLocked?' \uD83D\uDD12':''}</div>`;
  }).join('');

  let stageContent='';
  if(displayStage==='Complete'||isComplete){
    stageContent=`<div class="checklist-body"><div style="background:var(--grn-l);border:1px solid var(--grn);border-radius:var(--rl);padding:1.25rem;display:flex;align-items:center;gap:14px;margin-bottom:1rem"><span style="font-size:24px;color:var(--grn)">&#10003;</span><div><div style="font-size:15px;font-weight:600;color:var(--grn)">Registration complete</div><div style="font-size:12px;color:var(--grn-t);margin-top:2px">Completed on ${c.completedAt||c.createdAt||'—'}</div></div></div><div class="info-box">This case is marked complete. You can still review all stages and comments. Use the stage tabs above to navigate back to any stage.</div></div>`;
  } else if(c.caseType==='MP Registration'){
    if(displayStage==='Initial Check') stageContent=renderInitialCheck(c);
    else if(displayStage==='Scanned Document Check') stageContent=renderS1(c);
    else if(displayStage==='Original Documents Phase') stageContent=renderS2(c);
    else if(displayStage==='Linked Tickets') stageContent=renderEsigS2(c);
    else if(displayStage==='Signature & Party Creation') stageContent=renderS3(c);
    else if(displayStage==='eCAT Set-up') stageContent=renderS4(c);
  } else if(c.caseType==='MP Registration (eSIG)'){
    if(displayStage==='Initial Check') stageContent=renderInitialCheck(c);
    else if(displayStage==='Document Check') stageContent=renderEsigS1(c);
    else if(displayStage==='Linked Tickets') stageContent=renderEsigS2(c);
    else if(displayStage==='Signature & Party Creation') stageContent=renderEsigS3(c);
    else if(displayStage==='eCAT Set-up') stageContent=renderS4(c);
  } else if(c.caseType==='Amendment to PA'){
    if(displayStage==='Documents Check') stageContent=renderPaAmendDocsCheck(c);
    else if(displayStage==='Original Documents Phase') stageContent=renderPaAmendOriginals(c);
    else if(displayStage==='Signatures') stageContent=renderPaAmendSig(c);
    else if(displayStage==='eCAT Set-up') stageContent=renderPaAmendEcat(c);
    else if(displayStage==='Follow-up') stageContent=renderPaAmendFollowup(c);
  } else if(c.caseType==='Bank Guarantees'){
    if(displayStage==='Document Check') stageContent=renderBGDocCheck(c);
    else if(displayStage==='eCAT Set-up') stageContent=renderBGEcat(c);
    else if(displayStage==='Second Check') stageContent=renderBGSecondCheck(c);
    else if(displayStage==='Follow-up') stageContent=renderBGFollowup(c);
  } else if(c.caseType==='Bank Guarantee Amendments'){
    if(displayStage==='Document Check') stageContent=renderBGADocCheck(c);
    else if(displayStage==='eCAT Set-up') stageContent=renderBGAEcat(c);
    else if(displayStage==='Second Check') stageContent=renderBGASecondCheck(c);
    else if(displayStage==='Follow-up') stageContent=renderBGAFollowup(c);
  } else if(c.caseType==='Modification Requests'){
    if(displayStage==='Documents Check') stageContent=renderMRDocsCheck(c);
    else if(displayStage==='Follow-up') stageContent=renderMRFollowup(c);
  } else if(c.caseType==='MP Termination'){
    if(displayStage==='Request and Status') stageContent=renderTermRequest(c);
    else if(displayStage==='Funds Transfer Request') stageContent=renderTermFTR(c);
    else if(displayStage==='Actions in eCAT') stageContent=renderTermEcat(c);
    else if(displayStage==='Contacted and Follow-up') stageContent=renderTermFollowup(c);
  } else {
    stageContent=`<div class="checklist-body"><div class="info-box">Checklist for <strong>${esc(c.caseType)}</strong> is being mapped and will be added soon. Use the comments below to track progress.</div></div>`;
  }

  const metaExtra=c.caseType==='Bank Guarantees'||c.caseType==='Bank Guarantee Amendments'?`<span class="meta-item"><span class="meta-label">BG:</span>${esc(c.bgNumber||'—')}</span>`:'';
  const metaAmend=['Bank Guarantee Amendments','Amendment to PA'].includes(c.caseType)?`<span class="meta-item"><span class="meta-label">Amendment:</span>${esc(c.amendNumber||'—')}${c.caseType==='Amendment to PA'&&c.amendVersion>1?` <span style="color:var(--acc);font-weight:600">v${c.amendVersion}</span>`:c.caseType==='Amendment to PA'&&c.amendNumber?' <span style="color:var(--txt3)">v1</span>':''}</span>`:'';
  const metaMod=c.caseType==='Modification Requests'?`<span class="meta-item"><span class="meta-label">Change:</span>${esc(c.modType||'—')}</span>`:'';

  const editPanel=editHeaderOpen?`<div class="edit-hdr-panel">
    <div class="ehp-grid">
      <div class="fg"><label>MP name</label><input id="eh-name" value="${esc(c.mpName)}"/></div>
      <div class="fg"><label>MP short name</label><input id="eh-sn" value="${esc(c.mpShortName||'')}"/></div>
      <div class="fg"><label>EIC code</label><input id="eh-eic" value="${esc(c.eic||'')}"/></div>
      <div class="fg"><label>ACER code</label><input id="eh-ac" value="${esc(c.acerCode||'')}"/></div>
      <div class="fg"><label>VAT number</label><input id="eh-vat" value="${esc(c.vatNumber||'')}"/></div>
      ${(c.caseType==='MP Registration'||c.caseType==='MP Registration (eSIG)')?`<div class="fg"><label>Previous EIC (if re-registration)</label><input id="eh-prev-eic" value="${esc(c.previousEic||'')}"/></div>`:''}
      ${c.caseType==='Bank Guarantees'||c.caseType==='Bank Guarantee Amendments'?`<div class="fg"><label>BG number</label><input id="eh-bg" value="${esc(c.bgNumber||'')}"/></div>`:''}
      ${['Bank Guarantee Amendments','Amendment to PA'].includes(c.caseType)?`<div class="fg"><label>Amendment number</label><input id="eh-amend" value="${esc(c.amendNumber||'')}"/></div>`:''}
      ${c.caseType==='Modification Requests'?`<div class="fg"><label>Change type</label><select id="eh-modtype"><option value="">Select...</option>${MOD_TYPES.map(m=>`<option ${m===c.modType?'selected':''}>${esc(m)}</option>`).join('')}</select></div>`:''}
      ${c.caseType!=='Amendment to PA'?`<div class="fg"><label>Country</label><select id="eh-country"><option value="">Select...</option>${COUNTRIES.map(x=>`<option ${x===c.country?'selected':''}>${esc(x)}</option>`).join('')}</select></div>`:''}
      ${c.caseType!=='Amendment to PA'?`<div class="fg"><label>Contact person</label><input id="eh-cp" value="${esc(c.contactPerson||'')}"/></div>`:''}
      ${c.caseType!=='Amendment to PA'?`<div class="fg"><label>Contact email</label><input id="eh-ce" value="${esc(c.contactEmail||'')}"/></div>`:''}
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn primary sm" onclick="saveHeader('${id}')">Save</button>
      <button class="btn sm" onclick="cancelHeader()">Cancel</button>
    </div>

  const footer=isComplete?`<div class="stage-footer"><div class="progress-summary" style="color:var(--grn)">&#10003; Registration complete</div><div style="display:flex;gap:8px"><button class="btn sm" onclick="prevStage('${id}')">&#8592; Reopen to previous stage</button></div></div>`:`<div class="stage-footer">
    <div>
      ${missing<0?`<div class="blocked-msg">&#9888; ${Math.abs(missing)} previous stage${Math.abs(missing)>1?'s':''} must be completed first</div>`:missing>0?`<div class="blocked-msg">&#9888; ${missing} mandatory item${missing>1?'s':''} remaining</div>`:`<div class="progress-summary">${p}% complete</div>`}
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      ${stageIdx>0?`<button class="btn sm" onclick="prevStage('${id}')">&#8592; Back</button>`:''}
      <button class="btn${canAdvance(c)?' success':' primary'} sm" onclick="advanceStage('${id}')">
        ${isLast?'Mark complete':'Advance to next stage &#8594;'}
      </button>
    </div>
  </div>`;

  document.getElementById('case-view').innerHTML=`
    <div class="case-hdr">
      <div class="case-hdr-top">
        <div>
          <div class="case-title-row" style="margin-bottom:4px">
            <span class="case-id-badge">${c.id}</span>
            <span class="case-name">${esc(c.mpName)}</span>
            <span class="cr-badge ${badgeClass(c.caseType)}">${esc(c.caseType==='Modification Requests'&&c.modType?c.modType:c.caseType)}</span>
          </div>
          <div class="case-meta">
            <span class="meta-item"><span class="meta-label">EIC:</span><span class="eic-link" onclick="setEicFilter('${esc(c.eic||'')}')" title="Filter all cases by this EIC">${esc(c.eic||'—')}</span></span>
            ${c.previousEic?`<span class="meta-item"><span class="meta-label">Prev. EIC:</span><span class="eic-link" onclick="setEicFilter('${esc(c.previousEic)}')" title="Filter by previous EIC">${esc(c.previousEic)}</span></span>`:''}
            <span class="meta-item"><span class="meta-label">ACER:</span>${esc(c.acerCode||'—')}</span>
            <span class="meta-item"><span class="meta-label">VAT:</span>${esc(c.vatNumber||'—')}</span>

        </div>

          <button class="edit-fields-btn" onclick="toggleEditHeader()" title="Edit case details">&#9998; Edit details</button>

    ${stageContent}
    ${footer}
    <div class="comments-section">${renderComments(c)}</div>

function jumpStage(id,stage){
  const c=cases.find(x=>x.id===id);if(!c) return;
  if(stage==='Complete'&&c.stage!=='Complete'){
    toast('Use the "Mark complete" button to complete this case');return;
  }
  viewingStage=stage;
  const sbList=document.getElementById('sb-list');
  const sbScroll=sbList?sbList.scrollTop:0;
  renderList();
  if(sbList) sbList.scrollTop=sbScroll;
  renderCase(id);
  const newBody=document.querySelector('.checklist-body');
  if(newBody) newBody.scrollTop=0;
}

function toggleEditHeader(){editHeaderOpen=!editHeaderOpen;renderCase(activeId);}
function cancelHeader(){editHeaderOpen=false;renderCase(activeId);}

function saveHeader(id){
  const c=cases.find(x=>x.id===id);if(!c) return;
  const n=document.getElementById('eh-name')?.value.trim();
  const e=document.getElementById('eh-eic')?.value.trim();
  if(!n){alert('MP name required');return;}
  if(!e){alert('EIC code required');return;}
  c.mpName=n;c.eic=e;
  c.country=document.getElementById('eh-country')?.value||c.country;
  c.contactPerson=document.getElementById('eh-cp')?.value.trim()||'';
  c.contactEmail=document.getElementById('eh-ce')?.value.trim()||'';
  c.mpShortName=document.getElementById('eh-sn')?.value.trim()||'';
  c.acerCode=document.getElementById('eh-ac')?.value.trim()||'';
  c.vatNumber=document.getElementById('eh-vat')?.value.trim()||'';
  if(document.getElementById('eh-prev-eic')) c.previousEic=document.getElementById('eh-prev-eic').value.trim();
  if(document.getElementById('eh-bg')) c.bgNumber=document.getElementById('eh-bg').value.trim();
  if(document.getElementById('eh-amend')) c.amendNumber=document.getElementById('eh-amend').value.trim();
  if(document.getElementById('eh-modtype')) c.modType=document.getElementById('eh-modtype').value;
  editHeaderOpen=false;
  saveCases();renderList();renderCase(id);toast('Details saved');
}

function ci(c,k,req,na){
  const id='ck_'+Math.abs([...k].reduce((a,x,i)=>a+x.charCodeAt(0)*(i+1),0)%99999);
  const chk=(c.checks||{})[k];
  return `<div class="ci${chk?' checked':''}${na?' na':''}${req?' req':''}">
    <input type="checkbox" id="${id}" ${chk?'checked':''} ${na?'disabled':''} onchange="tglChk('${c.id}','${k.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;')}',this.checked)">
    <label for="${id}">${esc(k)}</label>
    ${!req&&!na?'<span class="opt-note">optional</span>':''}
  </div>`;
}

function countC(c,arr){return arr.filter(k=>(c.checks||{})[k]).length;}

function renderS1(c){
  const ruleChks=RULES.map(r=>{
    const id='rl_'+Math.abs([...r].reduce((a,x,i)=>a+x.charCodeAt(0)*(i+1),0)%99999);

    return`<div class="ci${on?' checked':''}"><input type="checkbox" id="${id}" ${on?'checked':''} onchange="tglRule('${c.id}','${r.replace(/'/g,"\\'")}',this.checked)"><label for="${id}">${esc(r)}</label><span class="opt-note">optional</span></div>`;

    const cur=(c.tso||{})[b.label]||b.def;
    return`<div class="tso-row"><span class="tso-label">${esc(b.label)}</span><select class="tso-sel" onchange="setTso('${c.id}','${b.label.replace(/'/g,"\\'")}',this.value)">${b.opts.map(o=>`<option ${o===cur?'selected':''}>${o}</option>`).join('')}</select></div>`;
  }).join('');
  return`<div class="checklist-body">
    <div class="section"><div class="sh">PA checks <span class="sh-count">${countC(c,PA_CHECKS)}/${PA_CHECKS.length}</span></div>${PA_CHECKS.map(k=>ci(c,k,true)).join('')}${PA_OPTIONAL.map(k=>ci(c,k,false)).join('')}</div>

function tglChk(id,k,v){
  const c=cases.find(x=>x.id===id);if(!c) return;

}
function ruleToCode(r){
  if(r==='Relevant Shadow Allocation Rules') return 'shadow';
  if(r.includes('CZ-DE')&&r.includes('CZ-PL')) return 'cz_s';
  if(r==='Daily Capacity Allocation on Swiss Borders') return 'swiss_d';
  if(r.includes('Swiss Border')&&r.includes('Forward')) return 'swiss_lt';
  if(r.toLowerCase().includes('intraday')&&!r.includes('IFA')&&!r.includes('ElecLink')&&!r.includes('Viking')&&!r.includes('Switzerland')) return 'intraday';
  if(r.includes('IFA')) return 'ifa';
  if(r.includes('ElecLink')) return 'el';
  if(r.includes('Viking')) return 'vk';
  if(r.includes('Ukrainian')) return 'ua';
  if(r.includes('serviced by JAO')) return 'xjao';
  if(r.includes('Italy-Montenegro')) return 'itme';
  return null;
}

function tglRule(id,r,v){
  const c=cases.find(x=>x.id===id);if(!c) return;
  c.rules=c.rules||[];
  if(!v){
    const code=ruleToCode(r);
    if(code){
      const dependentItems=ECAT_ITEMS.filter(x=>x.r===code).map(x=>x.t);
      const anyTicked=dependentItems.some(k=>(c.checks||{})[k]);
      if(anyTicked){
        toast('Cannot untick — related eCAT items are already checked. Untick them first in eCAT Set-up.');
        const sbList=document.getElementById('sb-list');
        const sbScroll=sbList?sbList.scrollTop:0;
        renderCase(id);
        if(sbList) sbList.scrollTop=sbScroll;
        return;
      }
    }
    c.rules=c.rules.filter(x=>x!==r);
  } else {
    if(!c.rules.includes(r)) c.rules.push(r);
  }
  saveCases();
}
function setTso(id,b,v){const c=cases.find(x=>x.id===id);if(!c) return;c.tso=c.tso||{};c.tso[b]=v;saveCases();}
function setDt(id,k,v){
  const c=cases.find(x=>x.id===id);if(!c) return;
  c.dates=c.dates||{};c.dates[k]=v;saveCases();
  reRenderCase(id);
}

function createCase(){
  const name=document.getElementById('nc-name')?.value.trim();
  const eic=document.getElementById('nc-eic')?.value.trim();
  const country=document.getElementById('nc-country')?.value;
  const type=document.getElementById('nc-type')?.value||'MP Registration';
  if(!name){alert('MP name is required');return;}
  if(!eic){alert('EIC code is required');return;}
  const noCountryTypes=['Amendment to PA','Bank Guarantee Amendments','Bank Guarantees','MP Termination','Modification Requests'];
  if(!noCountryTypes.includes(type)&&!country){alert('Country is required');return;}

  const bgNumber=document.getElementById('nc-bg')?.value.trim()||'';
  const amendNumber=document.getElementById('nc-amend')?.value.trim()||'';

  // Duplicate prevention
  if(type==='MP Registration'||type==='MP Registration (eSIG)'){
    const dup=cases.find(x=>(x.caseType==='MP Registration'||x.caseType==='MP Registration (eSIG)')&&x.eic&&x.eic.toLowerCase()===eic.toLowerCase());
    if(dup){alert(`A registration case already exists for EIC ${eic} (${dup.id} — ${dup.mpName}). EIC codes are unique and can only be registered once.`);return;}
  }
  if(type==='Bank Guarantees'){
    if(!bgNumber){alert('BG number is required');return;}
    const dup=cases.find(x=>x.caseType==='Bank Guarantees'&&x.bgNumber&&x.bgNumber.toLowerCase()===bgNumber.toLowerCase());
    if(dup){alert(`A Bank Guarantee case already exists for BG number ${bgNumber} (${dup.id} — ${dup.mpName}). BG numbers are unique.`);return;}
  }
  if(type==='Bank Guarantee Amendments'){
    if(!bgNumber){alert('BG number is required');return;}
    if(!amendNumber){alert('Amendment number is required');return;}
    const dup=cases.find(x=>x.caseType==='Bank Guarantee Amendments'&&x.bgNumber&&x.bgNumber.toLowerCase()===bgNumber.toLowerCase()&&x.amendNumber&&x.amendNumber.toLowerCase()===amendNumber.toLowerCase());
    if(dup){alert(`A Bank Guarantee Amendment already exists for BG number ${bgNumber} with amendment number ${amendNumber} (${dup.id}). You can create a new amendment for the same BG with a different amendment number.`);return;}
  }

  // PA Amendment versioning — same amendment number → auto-increment version
  let amendVersion=1;
  if(type==='Amendment to PA'&&amendNumber){
    const existing=cases.filter(x=>x.caseType==='Amendment to PA'&&x.amendNumber&&x.amendNumber.toLowerCase()===amendNumber.toLowerCase());
    if(existing.length>0) amendVersion=Math.max(...existing.map(x=>x.amendVersion||1))+1;
  }

  const c={
    id:nextId(),caseType:type,mpName:name,eic,country,
    contactPerson:document.getElementById('nc-cp')?.value.trim()||'',
    contactEmail:document.getElementById('nc-ce')?.value.trim()||'',
    bgNumber,amendNumber,amendVersion,
    previousEic:document.getElementById('nc-prev-eic')?.value.trim()||'',
    modType:document.getElementById('nc-modtype')?.value||'',
    mpShortName:'',acerCode:'',
    stage:type==='MP Registration'?'Initial Check':type==='MP Registration (eSIG)'?'Initial Check':type==='Amendment to PA'?'Documents Check':(type==='Bank Guarantees'||type==='Bank Guarantee Amendments')?'Document Check':type==='Modification Requests'?'Documents Check':type==='MP Termination'?'Request and Status':'Documents Check',
    checks:{},rules:[],tso:{},dates:{},comments:[],completedStages:[],
    sopS1:'',sopDateS1:'',sopS4:'',sopDateS4:'',
    createdBy:currentUser.name||currentUser.email||'Unknown',
    createdAt:new Date().toISOString().slice(0,10),
  };
  cases.unshift(c);saveCases();closeModal();renderList();selectCase(c.id);toast('Case '+c.id+' created');
}

function importData(e){const f=e.target.files[0];if(!f) return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(!Array.isArray(d)) throw new Error();const ids=new Set(cases.map(c=>c.id));let n=0;d.forEach(c=>{if(!ids.has(c.id)){cases.push(c);n++;}});saveCases();renderList();toast('Imported '+n+' case(s)');}catch{alert('Invalid JSON file.');}};r.readAsText(f);e.target.value='';}

  const pw2=document.getElementById('cfg-pw2')?.value;
  if(pw&&pw!==pw2){document.getElementById('admin-save-msg').textContent='Passwords do not match.';document.getElementById('admin-save-msg').style.color='var(--red)';return;}
  CFG.appTitle=document.getElementById('cfg-title')?.value.trim()||CFG.appTitle;
  CFG.pageSize=parseInt(document.getElementById('cfg-pagesize')?.value)||20;
  CFG.odSharePointSite=document.getElementById('cfg-owner')?.value.trim()||CFG.odSharePointSite;
  CFG.odClientId=document.getElementById('cfg-clientid')?.value.trim()||CFG.odClientId;
  CFG.odTenantId=document.getElementById('cfg-tenantid')?.value.trim()||CFG.odTenantId;
  CFG.odFolder=document.getElementById('cfg-folder')?.value.trim()||CFG.odFolder;
  CFG.odFile=document.getElementById('cfg-file')?.value.trim()||CFG.odFile;
  if(pw) CFG.adminPassword=pw;
  saveConfig(CFG);
  applyConfigToUI();
  renderList();
  const msg=document.getElementById('admin-save-msg');
  msg.textContent='✓ Settings saved.';msg.style.color='var(--grn)';
  setTimeout(()=>closeModal(),1200);
}

function resetToDefaults(){
  if(!confirm('Reset all settings to defaults? This cannot be undone.')) return;
  CFG={...CONFIG_DEFAULTS};
  saveConfig(CFG);applyConfigToUI();renderList();
  toast('Settings reset to defaults');closeModal();
}

loadCases();
onTypeFilterChange();
renderList();
applyMobileLayout();
applyConfigToUI();
// OneDrive sync disabled in demo mode
</script>
</body>
